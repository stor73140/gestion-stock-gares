<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Stock Gares</title>
<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
h2{margin-top:30px}
form, .box{background:#fff;padding:15px;border-radius:5px;margin-bottom:20px}
input,select,button{padding:8px;margin:5px 0;width:100%}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid #ccc;padding:8px}
th{background:#eee}
.hidden{display:none}
.actions button{margin-right:5px}
</style>
</head>

<body>

<div id="pinBox" class="box">
  <h2>🔐 Code PIN</h2>
  <input type="password" id="pinInput" placeholder="Code à 4 chiffres">
  <button onclick="checkPin()">Entrer</button>
</div>

<div id="app" class="hidden">

<h1>Gestion des pièces – Gares</h1>

<h2>➕ Ajouter une gare</h2>
<form onsubmit="addGare(event)">
  <input id="gareNom" placeholder="Nom de la gare" required>
  <button>Ajouter</button>
</form>

<h2>➕ Ajouter / Modifier une pièce</h2>
<form onsubmit="addPiece(event)">
  <input id="pieceNom" placeholder="Nom de la pièce" required>
  <input id="pieceQte" type="number" placeholder="Quantité" required>
  <select id="gareSelect"></select>
  <input type="hidden" id="editIndex">
  <button>Enregistrer</button>
</form>

<button onclick="exportCSV()">📤 Export Excel</button>

<h2>📦 Stock</h2>
<table>
<thead>
<tr><th>Gare</th><th>Pièce</th><th>Qté</th><th>Actions</th></tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script>
const PIN = "1234";
let data = JSON.parse(localStorage.getItem("stock")) || {gares:[],pieces:[]};

function save(){localStorage.setItem("stock",JSON.stringify(data))}
function checkPin(){
  if(pinInput.value===PIN){
    pinBox.classList.add("hidden");
    app.classList.remove("hidden");
    refresh();
  } else alert("Code incorrect");
}

function refresh(){
  gareSelect.innerHTML="";
  table.innerHTML="";
  data.gares.forEach(g=>gareSelect.innerHTML+=`<option>${g}</option>`);
  data.pieces.forEach((p,i)=>{
    table.innerHTML+=`
    <tr>
      <td>${p.gare}</td>
      <td>${p.nom}</td>
      <td>${p.qte}</td>
      <td class="actions">
        <button onclick="edit(${i})">✏️</button>
        <button onclick="del(${i})">🗑️</button>
      </td>
    </tr>`;
  });
}

function addGare(e){
  e.preventDefault();
  if(!data.gares.includes(gareNom.value)){
    data.gares.push(gareNom.value);
    save(); refresh();
  }
  gareNom.value="";
}

function addPiece(e){
  e.preventDefault();
  const i = editIndex.value;
  const obj={nom:pieceNom.value,qte:pieceQte.value, gare:gareSelect.value};
  if(i==="") data.pieces.push(obj);
  else data.pieces[i]=obj;
  editIndex.value="";
  pieceNom.value=""; pieceQte.value="";
  save(); refresh();
}

function edit(i){
  const p=data.pieces[i];
  pieceNom.value=p.nom;
  pieceQte.value=p.qte;
  gareSelect.value=p.gare;
  editIndex.value=i;
}

function del(i){
  if(confirm("Supprimer cette pièce ?")){
    data.pieces.splice(i,1);
    save(); refresh();
  }
}

function exportCSV(){
  let csv="Gare,Pièce,Quantité\n";
  data.pieces.forEach(p=>csv+=`${p.gare},${p.nom},${p.qte}\n`);
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download="stock.csv";
  a.click();
}
</script>

</body>
</html>
